<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fathul Qorib - Interaktif</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left" style="display:flex; align-items:center;">
                <button id="next-page" class="nav-btn" title="Halaman Berikutnya">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <span id="page-indicator" style="margin: 0 10px; font-weight:bold;">1</span>
                <button id="prev-page" class="nav-btn" title="Halaman Sebelumnya">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>

            <div class="toolbar-center" style="position:absolute; left:50%; transform:translateX(-50%);">
                <span class="app-title">فتح القريب</span>
            </div>
            
            <div class="toolbar-right">
                <button id="toggle-harakat" class="tool-btn" title="Tampilkan/Sembunyikan Harakat" style="font-family: Amiri, serif; font-size: 18px; font-weight: bold;">
                    حَرَكَات
                </button>
                <button id="toggle-translation" class="tool-btn" title="Terjemahan Lengkap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
                </button>
                <button id="toggle-fullscreen" class="tool-btn" title="Layar Penuh">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
                <div class="theme-switcher">
                    <button id="theme-yellow" class="theme-btn" title="Kertas Kuning (Pesantren)"></button>
                    <button id="theme-white" class="theme-btn active" title="Kertas Putih"></button>
                </div>
            </div>
        </div>

        <!-- Document Viewer -->
        <div class="viewer-wrapper" id="page-wrapper">
            <div class="a4-page theme-white" id="content-area">
                <!-- Lines will be injected by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Word Popup Modal -->
    <div id="word-popup" class="popup hidden">
        <div class="popup-header">
            <span id="popup-word" class="arabic-word"></span>
            <button id="close-popup" class="close-btn">&times;</button>
        </div>
        <div class="popup-content" id="popup-content">
            <div class="popup-section" id="sec-translation">
                <span class="section-label">Terjemahan:</span>
                <p id="popup-translation" class="translation-text"></p>
            </div>
            <div class="popup-section" id="sec-irab-ar">
                <span class="section-label">الإعراب (I'rab):</span>
                <p id="popup-irab-ar" class="detail-text arabic-text" dir="rtl"></p>
            </div>
            <div class="popup-section" id="sec-ilal-ar">
                <span class="section-label">الإعلال (I'lal):</span>
                <p id="popup-ilal-ar" class="detail-text arabic-text" dir="rtl"></p>
            </div>
        </div>
        <div class="popup-arrow"></div>
    </div>

    <div id="overlay" class="hidden"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
