<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fikih Manhaji - Interaktif</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left" style="display:flex; align-items:center;">
                <!-- Karena RTL, elemen pertama di HTML akan muncul paling KANAN -->
                <button id="next-page" class="nav-btn" title="Halaman Berikutnya">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <span id="page-indicator" style="margin: 0 10px; font-weight:bold;">99</span>
                <!-- Elemen terakhir di HTML akan muncul paling KIRI -->
                <button id="prev-page" class="nav-btn" title="Halaman Sebelumnya">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>

            <div class="toolbar-center" style="position:absolute; left:50%; transform:translateX(-50%);">
                <span class="app-title">الفقه المنهجي</span>
            </div>
            
            <div class="toolbar-right">
                <button id="toggle-harakat" class="tool-btn active" title="Sembunyikan/Tampilkan Harakat" style="color: #3b82f6;">
                    <span style="font-family:'Amiri',serif; font-size: 22px; font-weight:bold; line-height:1;">عَ</span>
                </button>
                <button id="toggle-translation" class="tool-btn" title="Terjemahan Lengkap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
                </button>
                <div class="theme-switcher">
                    <button id="theme-yellow" class="theme-btn active" title="Kertas Kuning (Pesantren)"></button>
                    <button id="theme-white" class="theme-btn" title="Kertas Putih"></button>
                </div>
            </div>
        </div>

        <!-- Document Viewer -->
        <div class="viewer-wrapper" id="page-wrapper">
            <div class="a4-page theme-yellow" id="content-area">
                <!-- Content will be injected by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Word Popup Modal -->
    <div id="word-popup" class="popup hidden">
        <div class="popup-header">
            <span id="popup-word" class="arabic-word"></span>
            <button id="close-popup" class="close-btn">&times;</button>
        </div>
        <div class="popup-content">
            <div class="popup-section">
                <span class="section-label">Makna/Terjemahan:</span>
                <p id="popup-translation" class="translation-text"></p>
            </div>
            <div class="popup-section" id="root-section">
                <span class="section-label">Akar Kata:</span>
                <p id="popup-root" class="root-text"></p>
            </div>
            <div class="popup-section" id="verb-section">
                <span class="section-label">Bentuk Fi'il:</span>
                <p id="popup-verb" class="explanation-text"></p>
            </div>
            <div class="popup-section" id="fail-section">
                <span class="section-label">Rujukan Fa'il (Subjek):</span>
                <p id="popup-fail" class="explanation-text"></p>
            </div>
            <div class="popup-section" id="irab-section">
                <span class="section-label">Kedudukan / I'rab:</span>
                <p id="popup-irab" class="irab-text"></p>
            </div>
            <div class="popup-section" id="joined-section">
                <span class="section-label">Susunan Kata Bersambung:</span>
                <p id="popup-joined" class="explanation-text"></p>
            </div>
            <div class="popup-section" id="pronoun-section">
                <span class="section-label">Rujukan Kata Ganti (Dhamir):</span>
                <p id="popup-pronoun" class="explanation-text"></p>
            </div>
            <div class="popup-section" id="explanation-section">
                <span class="section-label">Penjelasan:</span>
                <p id="popup-explanation" class="explanation-text"></p>
            </div>
        </div>
        <div class="popup-arrow"></div>
    </div>

    <!-- Page overlay for clicking outside popup -->
    <div id="overlay" class="hidden"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
